<div class="detail-container" *ngIf="post">

  <mat-card class="post-card">

    <mat-card-header>

      <mat-icon mat-card-avatar>account_circle</mat-icon>

      <mat-card-title>
        {{ post.title }}
      </mat-card-title>
      
      <mat-card-subtitle *ngIf="user">
        {{ user.name }}
      </mat-card-subtitle>

    </mat-card-header>

    <mat-divider></mat-divider>
    <mat-card-content>

      <p class="post-body">
        {{ post.body }}
      </p>

    </mat-card-content>


  </mat-card>

</div>
